<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Construction Equipment Store</title>
    <link rel="icon" type="image/png" href="img/icon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
</head>
<body>

    <section id="header">
        <img id="logo" src="img/Logo.png" alt="DOG Logo">
        <ul class="navbar">
            <li><a href="index.html">Home</a></li>
            <li><a class="active" href="products.html">Products</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a class="cart-link" href="shopping_cart.html"><i class="fas fa-shopping-cart"></i><span class="cart-count" aria-label="Items in cart">0</span></a></li>
        </ul>
    </section>

    <section id="products-header">
        <div class="products-header-content">
            <h1>Construction Equipment</h1>
            <p>Find the right tools for your project</p>
        </div>
    </section>

    <section id="products-container">
        <aside class="products-sidebar">
            <div class="filter-box">
                <h3>Filter Products</h3>

                <div class="filter-group">
                    <h4>Category</h4>
                    <label><input type="checkbox" name="category" value="Excavators"> Excavators</label>
                    <label><input type="checkbox" name="category" value="Bulldozers"> Bulldozers</label>
                    <label><input type="checkbox" name="category" value="Cranes"> Cranes</label>
                    <label><input type="checkbox" name="category" value="Loaders"> Loaders</label>
                    <label><input type="checkbox" name="category" value="Drills"> Drills</label>
                    <label><input type="checkbox" name="category" value="Compactors"> Compactors</label>
                </div>

                <div class="filter-group">
                    <h4>Price Range</h4>
                    <label><input type="radio" name="price" value="under-5000"> Under $5,000</label>
                    <label><input type="radio" name="price" value="5000-15000"> $5,000 - $15,000</label>
                    <label><input type="radio" name="price" value="15000-50000"> $15,000 - $50,000</label>
                    <label><input type="radio" name="price" value="50000-plus"> $50,000+</label>
                </div>

                <div class="filter-group">
                    <h4>Condition</h4>
                    <label><input type="checkbox" name="condition" value="New"> New</label>
                    <label><input type="checkbox" name="condition" value="Used"> Used</label>
                    <label><input type="checkbox" name="condition" value="Refurbished"> Refurbished</label>
                </div>

                <div class="filter-actions">
                    <button class="filter-btn" type="button">Apply Filters</button>
                    <button class="reset-filter-btn" id="reset-filter-btn" type="button">
                        <i class="fas fa-rotate-left"></i> Reset Filters
                    </button>
                </div>
            </div>
        </aside>

        <div class="products-main">
            <div class="products-top">
                <div class="sort-section">
                    <label for="sort">Sort By:</label>
                    <select id="sort">
                        <option>Newest</option>
                        <option>Price: Low to High</option>
                        <option>Price: High to Low</option>
                        <option>Best Rated</option>
                        <option>Most Popular</option>
                    </select>
                </div>
                <div class="results-count">
                    <p><span id="result-count">20</span> results</p>
                </div>
            </div>

            <div class="products-grid-large" aria-live="polite"></div>

            <div class="pagination">
                <button class="page-btn prev" id="prev-btn" type="button">← Previous</button>
                <div id="page-numbers" class="page-numbers"></div>
                <button class="page-btn next" id="next-btn" type="button">Next →</button>
            </div>
        </div>
    </section>

 <footer id="footer">
    <div class="footer-content">
        <div class="footer-section">

        </div>
        <div class="footer-section">
            <h4>Customer Service</h4>
            <ul>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="about.html">About Us</a></li>
            </ul>
        </div>
        <div class="footer-section">
            <h4>Connect With Us</h4>
            <div class="social-links">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </div>
    <div class="footer-bottom">
        <p>&copy; 2026 Your Store. All rights reserved.</p>
    </div>
</footer>


    <div class="product-modal" id="product-modal" aria-hidden="true">
        <div class="product-modal-backdrop" data-close-modal></div>
        <section class="product-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-product-name">
            <button class="product-modal-close" type="button" aria-label="Close product details" data-close-modal>&times;</button>
            <div class="product-modal-image">
                <img id="modal-product-image" src="img/logo-placeholder.png" alt="">
                <span id="modal-product-badge" class="modal-product-badge"></span>
            </div>
            <div class="product-modal-content">
                <p id="modal-product-meta" class="modal-product-meta"></p>
                <h2 id="modal-product-name"></h2>
                <div id="modal-product-rating" class="rating"></div>
                <p id="modal-product-description" class="modal-product-description"></p>
                <div class="modal-price-row">
                    <span id="modal-product-price" class="modal-product-price"></span>
                    <span id="modal-product-original-price" class="modal-product-original-price"></span>
                </div>
                <div class="modal-purchase-row">
                    <div class="modal-quantity" aria-label="Select quantity">
                        <button id="modal-qty-minus" type="button" aria-label="Decrease quantity">&minus;</button>
                        <input id="modal-quantity" type="number" min="1" max="99" value="1" aria-label="Product quantity">
                        <button id="modal-qty-plus" type="button" aria-label="Increase quantity">+</button>
                    </div>
                    <button id="modal-add-to-cart" class="modal-add-to-cart" type="button">
                        <i class="fas fa-cart-plus"></i> Add to Cart
                    </button>
                </div>
                <p id="modal-cart-message" class="modal-cart-message" aria-live="polite"></p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
